<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Demo Produk - Al-Haramain</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:0;padding:0;background:#f7f7f7}
    header{background:#1a472a;color:#fff;padding:1rem;display:flex;align-items:center;justify-content:space-between}
    .brand{font-weight:700}
    .top-actions{display:flex;gap:1rem;align-items:center}
    #cartIcon{cursor:pointer;position:relative}
    #cartCount{background:#ff4d4f;color:#fff;border-radius:50%;padding:2px 6px;font-size:12px;position:absolute;top:-8px;right:-8px}
    main{padding:1rem;max-width:1100px;margin:1rem auto}
    #productsGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
    .product-card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.08);cursor:pointer}
    .product-image{width:100%;height:200px;object-fit:cover}
    .product-info{padding:0.75rem}
    .product-price{display:flex;gap:.5rem;align-items:center}
    .original{text-decoration:line-through;color:#888;font-size:13px}
    .discount{color:#d23a3a;font-weight:700}
    .add-to-cart{margin-top:.5rem;padding:.5rem .6rem;background:#1a472a;color:#fff;border:0;border-radius:6px;cursor:pointer}

    /* Cart Modal */
    #cartModal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center}
    #cartModal.active{display:flex}
    .cart-box{background:#fff;width:90%;max-width:680px;border-radius:8px;padding:1rem;position:relative}
    #cartClose{position:absolute;right:12px;top:12px;cursor:pointer}
    .cart-item{display:flex;gap:.75rem;border-bottom:1px solid #eee;padding:.5rem 0}
    .cart-item-image{width:64px;height:64px;object-fit:cover;border-radius:6px}
    .cart-actions{display:flex;gap:.5rem;align-items:center}

    /* Simple responsive */
    @media (max-width:480px){.product-image{height:140px}}
  </style>
</head>
<body>
  <header>
    <div class="brand">Al-Haramain - Demo</div>
    <div class="top-actions">
      <div id="cartIcon">Keranjang <span id="cartCount">0</span></div>
    </div>
  </header>

  <main>
    <section>
      <h2>Produk</h2>
      <div id="productsGrid"></div>
    </section>
  </main>

  <!-- Cart Modal -->
  <div id="cartModal">
    <div class="cart-box">
      <div id="cartClose">Tutup ✕</div>
      <h3>Keranjang Anda</h3>
      <div id="cartItemsContainer"></div>
      <div style="text-align:right;margin-top:1rem">Total: <strong id="cartTotalPrice">Rp 0</strong></div>
    </div>
  </div>

  <script>
    // Data produk (diambil dari Indexhtml.txt)
    const productsData = [
        { id:1, name:"UTSMAN Series", originalPrice:450000, discountPrice:350000, desc:"Material semi wool, detail elegan.", image:"https://placehold.co/300x300/1a472a/white?text=UTSMAN+Series", category:"baju koko"},
        { id:2, name:"Hamzah Series", originalPrice:425000, discountPrice:325000, desc:"Warna cokelat eksklusif, premium buttons.", image:"https://placehold.co/300x300/2d6a4f/white?text=Hamzah+Series", category:"baju koko"},
        { id:3, name:"Thobe Navy", originalPrice:400000, discountPrice:300000, desc:"Shanghai collar, tampilan modern.", image:"https://placehold.co/300x300/c9a03d/white?text=Thobe+Navy", category:"jubah"},
        { id:4, name:"Umar Series", originalPrice:420000, discountPrice:320000, desc:"Potongan modern, detail rapi.", image:"https://placehold.co/300x300/1a472a/white?text=Umar+Series", category:"baju koko"},
        { id:5, name:"Ali Series", originalPrice:430000, discountPrice:330000, desc:"Material halus, tampilan mewah.", image:"https://placehold.co/300x300/2d6a4f/white?text=Ali+Series", category:"baju koko"},
        { id:6, name:"New Navy", originalPrice:380000, discountPrice:300000, desc:"Desain klasik dengan sentuhan modern.", image:"https://placehold.co/300x300/c9a03d/white?text=New+Navy", category:"jubah"}
    ];

    // State
    let cart = [];

    // Elements
    const productsGrid = document.getElementById('productsGrid');
    const cartIcon = document.getElementById('cartIcon');
    const cartModal = document.getElementById('cartModal');
    const cartClose = document.getElementById('cartClose');
    const cartItemsContainer = document.getElementById('cartItemsContainer');
    const cartTotalPrice = document.getElementById('cartTotalPrice');
    const cartCount = document.getElementById('cartCount');

    function formatRupiah(amount){return 'Rp '+ amount.toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.')}
    function saveCart(){localStorage.setItem('alharamainCart', JSON.stringify(cart))}
    function loadCart(){const s=localStorage.getItem('alharamainCart'); if(s){cart=JSON.parse(s); updateCartUI()}}

    function renderProducts(){
      productsGrid.innerHTML = productsData.map(p=>`
        <div class="product-card" data-id="${p.id}">
          <img class="product-image" src="${p.image}" alt="${p.name}">
          <div class="product-info">
            <h4 class="product-title">${p.name}</h4>
            <div class="product-price"><span class="original">${formatRupiah(p.originalPrice)}</span><span class="discount">${formatRupiah(p.discountPrice)}</span></div>
            <p style="font-size:13px;color:#555">${p.desc}</p>
            <button class="add-to-cart" data-id="${p.id}">Tambah ke Keranjang</button>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.add-to-cart').forEach(btn=>btn.addEventListener('click', (e)=>{e.stopPropagation(); addToCart(parseInt(btn.dataset.id))}));
    }

    function addToCart(productId){
      const prod = productsData.find(x=>x.id===productId); if(!prod) return;
      const ex = cart.find(i=>i.id===productId);
      if(ex) ex.quantity++;
      else cart.push({id:prod.id, name:prod.name, price:prod.discountPrice, image:prod.image, quantity:1});
      saveCart(); updateCartUI(); alert(prod.name + ' ditambahkan ke keranjang');
    }

    function updateCartUI(){
      const totalItems = cart.reduce((s,i)=>s+i.quantity,0); cartCount.textContent = totalItems;
      if(cart.length===0){cartItemsContainer.innerHTML='<div style="padding:1rem;text-align:center">Keranjang kosong</div>'; cartTotalPrice.textContent=formatRupiah(0); return}
      let html=''; let total=0;
      cart.forEach(item=>{ const sub=item.price*item.quantity; total+=sub; html+=`<div class="cart-item" data-id="${item.id}"><img class="cart-item-image" src="${item.image}"><div style="flex:1"><div>${item.name}</div><div style="color:#666">${formatRupiah(item.price)}</div><div class="cart-actions"><button data-id="${item.id}" class="minus">-</button><span style="padding:0 .5rem">${item.quantity}</span><button data-id="${item.id}" class="plus">+</button></div></div><div style="cursor:pointer;color:#c00" data-id="${item.id}" class="del">Hapus</div></div>`});
      cartItemsContainer.innerHTML = html; cartTotalPrice.textContent = formatRupiah(total);

      document.querySelectorAll('.minus').forEach(b=>b.addEventListener('click',()=>{updateQuantity(parseInt(b.dataset.id), -1)}));
      document.querySelectorAll('.plus').forEach(b=>b.addEventListener('click',()=>{updateQuantity(parseInt(b.dataset.id), 1)}));
      document.querySelectorAll('.del').forEach(b=>b.addEventListener('click',()=>{removeFromCart(parseInt(b.dataset.id))}));
    }

    function updateQuantity(id, change){ const idx=cart.findIndex(i=>i.id===id); if(idx===-1) return; cart[idx].quantity+=change; if(cart[idx].quantity<=0) cart.splice(idx,1); saveCart(); updateCartUI() }
    function removeFromCart(id){ cart=cart.filter(i=>i.id!==id); saveCart(); updateCartUI(); }

    // Events
    if(cartIcon){cartIcon.addEventListener('click', ()=>{cartModal.classList.add('active'); updateCartUI()})}
    if(cartClose){cartClose.addEventListener('click', ()=>{cartModal.classList.remove('active')})}
    if(cartModal){cartModal.addEventListener('click', e=>{ if(e.target===cartModal) cartModal.classList.remove('active') })}

    // Init
    renderProducts(); loadCart();
  </script>
</body>
</html>
